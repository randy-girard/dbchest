---
# MySQL User Management
- name: Create MySQL User
  hosts: all
  become: yes

  tasks:
    - name: Create MySQL user
      mysql_user:
        name: "{{ username }}"
        password: "{{ password }}"
        priv: "{{ privileges | default('*.*:ALL') }}"
        host: "{{ host | default('%') }}"
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present
