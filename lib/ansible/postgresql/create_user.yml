---
- name: Create a PostgreSQL user
  hosts: all
  become: true

  tasks:
    - name: Ensure python3-psycopg2 is installed
      apt:
        name: python3-psycopg2
        state: present
        update_cache: no
      ignore_errors: yes

    - name: Ensure remote_tmp exists for postgres user
      file:
        path: /var/lib/postgresql/.ansible/tmp
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Get PostgreSQL hba_file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW hba_file;'
      register: pg_hba_file
      changed_when: false

    - name: Set fact for pg_hba.conf path
      set_fact:
        pg_hba_conf: "{{ pg_hba_file.stdout | trim }}"

    - name: Ensure pg_hba.conf entry exists
      lineinfile:
        path: "{{ pg_hba_conf }}"
        regexp: "^host\\s+all\\s+{{ username }}\\s+0.0.0.0/0\\s+"
        line: "host    all    {{ username }}    0.0.0.0/0    scram-sha-256"
        state: present
        insertafter: EOF
      notify: reload postgresql

    - name: Ensure PostgreSQL user is present
      become: true
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ username }}"
        password: "{{ password }}"
        role_attr_flags: CREATEDB,LOGIN
        state: present

  handlers:
    - name: reload postgresql
      become_user: postgres
      shell: |
        psql -c "SELECT pg_reload_conf();" postgres
