---
- name: Create a PostgreSQL user
  hosts: all
  become: true

  tasks:
    - name: Get PostgreSQL configuration paths
      community.postgresql.postgresql_info:
        filter: settings
      become_user: postgres
      register: pg_info

    - name: Set fact for pg_hba.conf path
      set_fact:
        pg_hba_conf: "{{ pg_info.settings.hba_file.setting }}"

    - name: Ensure pg_hba.conf entry exists
      lineinfile:
        path: "{{ pg_hba_conf }}"
        regexp: "^host\\s+all\\s+{{ username }}\\s+0.0.0.0/0\\s+"
        line: "host    all    {{ username }}    0.0.0.0/0    scram-sha-256"
        state: present
        insertafter: EOF
      notify: Reload PostgreSQL

    - name: Ensure PostgreSQL user is present
      become_user: postgres
      shell: |
        psql -c "CREATE USER {{ username }} WITH SUPERUSER PASSWORD '{{ password }}';" postgres || 
        psql -c "ALTER USER {{ username }} PASSWORD '{{ password }}';" postgres

  handlers:
    - name: Reload PostgreSQL
      service:
        name: postgresql
        state: reloaded
