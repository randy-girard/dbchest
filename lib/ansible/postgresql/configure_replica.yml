---
# Configure PostgreSQL Replica Node
# Dynamically detects configuration and data directory paths
- name: Configure PostgreSQL Replica
  hosts: postgres_servers
  become: yes
  vars:
    postgresql_version: "15"

  tasks:
    - name: Get PostgreSQL configuration file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW config_file;'
      register: pg_config_file
      changed_when: false

    - name: Get PostgreSQL data directory path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW data_directory;'
      register: pg_data_directory
      changed_when: false

    - name: Set PostgreSQL paths
      set_fact:
        postgresql_config_file: "{{ pg_config_file.stdout.strip() }}"
        postgresql_data_dir: "{{ pg_data_directory.stdout.strip() }}"
    - name: Stop PostgreSQL service
      systemd:
        name: postgresql
        state: stopped

    - name: Remove existing data directory
      file:
        path: "{{ postgresql_data_dir }}"
        state: absent

    - name: Create data directory
      file:
        path: "{{ postgresql_data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Take base backup from primary
      become_user: postgres
      shell: |
        PGPASSWORD='{{ replication_password }}' \
        pg_basebackup -h {{ primary_ip }} -D {{ postgresql_data_dir }} -U replicator -v -P -W -R

    - name: Remove any old recovery.conf file (not used in PostgreSQL 12+)
      file:
        path: "{{ postgresql_data_dir }}/recovery.conf"
        state: absent

    - name: Verify standby.signal file was created by pg_basebackup -R
      stat:
        path: "{{ postgresql_data_dir }}/standby.signal"
      register: standby_signal_check

    - name: Create standby.signal file if not created by pg_basebackup
      become_user: postgres
      file:
        path: "{{ postgresql_data_dir }}/standby.signal"
        state: touch
        owner: postgres
        group: postgres
        mode: '0600'
      when: not standby_signal_check.stat.exists

    - name: Add promote trigger file setting to postgresql.conf
      lineinfile:
        path: "{{ postgresql_config_file }}"
        regexp: "^#?promote_trigger_file"
        line: "promote_trigger_file = '/tmp/postgresql.trigger'"
        backup: yes

    - name: Verify replica configuration in postgresql.conf (should already be set)
      lineinfile:
        path: "{{ postgresql_config_file }}"
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        backup: yes
      loop:
        - { key: "hot_standby", value: "on" }
        - { key: "max_standby_streaming_delay", value: "30s" }
        - { key: "wal_receiver_status_interval", value: "10s" }
        - { key: "hot_standby_feedback", value: "on" }

    - name: Start PostgreSQL service
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to start
      wait_for:
        port: 5432
        host: localhost
        delay: 5
        timeout: 30
