---
# Configure PostgreSQL Replica Node
# Dynamically detects configuration and data directory paths
- name: Configure PostgreSQL Replica
  hosts: postgres_servers
  become: yes
  vars:
    postgresql_version: "15"

  tasks:
    - name: Get PostgreSQL configuration file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW config_file;'
      register: pg_config_file
      changed_when: false

    - name: Get PostgreSQL data directory path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW data_directory;'
      register: pg_data_directory
      changed_when: false

    - name: Set PostgreSQL paths
      set_fact:
        postgresql_config_file: "{{ pg_config_file.stdout.strip() }}"
        postgresql_data_dir: "{{ pg_data_directory.stdout.strip() }}"
    - name: Stop PostgreSQL service
      systemd:
        name: postgresql
        state: stopped

    - name: Remove existing data directory
      file:
        path: "{{ postgresql_data_dir }}"
        state: absent

    - name: Create data directory
      file:
        path: "{{ postgresql_data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Take base backup from primary
      become_user: postgres
      shell: |
        PGPASSWORD='{{ replication_password }}' \
        pg_basebackup -h {{ primary_ip }} -D {{ postgresql_data_dir }} -U replicator -v -P -W

    - name: Create recovery configuration
      become_user: postgres
      copy:
        content: |
          standby_mode = 'on'
          primary_conninfo = 'host={{ primary_ip }} port=5432 user=replicator password={{ replication_password }}'
          trigger_file = '/tmp/postgresql.trigger'
        dest: "{{ postgresql_data_dir }}/recovery.conf"
        owner: postgres
        group: postgres
        mode: '0600'

    - name: Verify replica configuration in postgresql.conf (should already be set)
      lineinfile:
        path: "{{ postgresql_config_file }}"
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        backup: yes
      loop:
        - { key: "hot_standby", value: "on" }
        - { key: "max_standby_streaming_delay", value: "30s" }
        - { key: "wal_receiver_status_interval", value: "10s" }
        - { key: "hot_standby_feedback", value: "on" }

    - name: Start PostgreSQL service
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to start
      wait_for:
        port: 5432
        host: localhost
        delay: 5
        timeout: 30

    - name: Verify replication is working
      become_user: postgres
      postgresql_query:
        db: postgres
        query: "SELECT client_addr, state FROM pg_stat_replication;"
      register: replication_status
      delegate_to: "{{ primary_ip }}"
      ignore_errors: yes

    - name: Display replication status
      debug:
        var: replication_status.query_result
      when: replication_status is defined
