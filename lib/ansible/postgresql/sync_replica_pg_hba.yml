---
# Sync pg_hba.conf entries on PostgreSQL replica
# This playbook adds or removes pg_hba.conf entries for a specific user on a replica node
- name: Sync pg_hba.conf entry on PostgreSQL replica
  hosts: all
  become: true

  tasks:
    - name: Ensure python3-psycopg2 is installed
      apt:
        name: python3-psycopg2
        state: present
        update_cache: no
      ignore_errors: yes

    - name: Get PostgreSQL hba_file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW hba_file;'
      register: pg_hba_file
      changed_when: false

    - name: Set fact for pg_hba.conf path
      set_fact:
        pg_hba_conf: "{{ pg_hba_file.stdout | trim }}"

    - name: Add pg_hba.conf entry for user
      lineinfile:
        path: "{{ pg_hba_conf }}"
        regexp: "^host\\s+all\\s+{{ username }}\\s+0.0.0.0/0\\s+"
        line: "host    all    {{ username }}    0.0.0.0/0    scram-sha-256"
        state: present
        insertafter: EOF
        backup: yes
      notify: reload postgresql
      when: action == 'add'

    - name: Remove pg_hba.conf entry for user
      lineinfile:
        path: "{{ pg_hba_conf }}"
        regexp: "^host\\s+all\\s+{{ username }}\\s+0.0.0.0/0\\s+scram-sha-256"
        state: absent
      notify: reload postgresql
      when: action == 'remove'

  handlers:
    - name: reload postgresql
      become_user: postgres
      shell: |
        psql -c "SELECT pg_reload_conf();" postgres
      register: reload_result
      changed_when: true
      failed_when: reload_result.rc != 0

