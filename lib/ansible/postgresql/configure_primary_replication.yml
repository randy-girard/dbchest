---
- name: Configure PostgreSQL Primary for Specific Replica
  hosts: postgres_servers
  become: yes
  vars:
    postgresql_version: "15"
    postgresql_config_dir: "/etc/postgresql/{{ postgresql_version }}/main"

  tasks:
    - name: Check if replication user exists
      become_user: postgres
      postgresql_query:
        db: postgres
        query: "SELECT 1 FROM pg_roles WHERE rolname='replicator'"
      register: replication_user_exists
      ignore_errors: yes

    - name: Create replication user if it doesn't exist
      become_user: postgres
      postgresql_user:
        name: replicator
        password: "{{ replication_password }}"
        role_attr_flags: REPLICATION
        state: present
      when: replication_user_exists.query_result | length == 0

    - name: Add replica-specific pg_hba.conf entry for replication
      lineinfile:
        path: "{{ postgresql_config_dir }}/pg_hba.conf"
        line: "host replication replicator {{ replica_ip }}/32 md5"
        backup: yes
      notify: reload postgresql

    - name: Add replica-specific pg_hba.conf entry for regular connections
      lineinfile:
        path: "{{ postgresql_config_dir }}/pg_hba.conf"
        line: "host all all {{ replica_ip }}/32 md5"
        backup: yes
      notify: reload postgresql

  handlers:
    - name: reload postgresql
      become_user: postgres
      postgresql_query:
        db: postgres
        query: "SELECT pg_reload_conf()"
