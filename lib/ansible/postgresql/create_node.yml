---
- name: Install PostgreSQL
  hosts: all
  become: yes
  vars:
    postgresql_version: 15
    postgres_password: "mysecurepassword"

  handlers:
    - name: Restart PostgreSQL
      service:
        name: postgresql
        state: restarted

  gather_facts: no
  pre_tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 30

  tasks:
    - name: Gather facts manually after SSH is ready
      ansible.builtin.setup:

    - name: Ensure prerequisites are installed
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - wget
          - gnupg
          - python3-psycopg2
        state: present
        update_cache: yes

    - name: Add PostgreSQL public key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

#    - name: Add PostgreSQL APT repository
#      apt_repository:
#        repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
#        state: present
#        filename: pgdg

    - name: Add PostgreSQL APT archive repository
      apt_repository:
        repo: "deb https://apt-archive.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
        state: present
        filename: pgdg

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install PostgreSQL packages
      apt:
        name:
          - "postgresql-{{ postgresql_version }}"
          - "postgresql-contrib-{{ postgresql_version }}"
        state: present

    - name: Ensure remote_tmp exists for postgres user
      file:
        path: /var/lib/postgresql/.ansible/tmp
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Allow remote connections in postgresql.conf
      lineinfile:
        path: /etc/postgresql/{{ postgresql_version }}/main/postgresql.conf
        regexp: '^#?listen_addresses\s*='
        line: "listen_addresses = '*'"
        state: present
      notify: Restart PostgreSQL

    - name: Allow remote connections in pg_hba.conf
      lineinfile:
        path: /etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf
        line: "host all all 0.0.0.0/0 md5"
        state: present
      notify: Restart PostgreSQL

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Set postgres password
      become: yes
      become_user: postgres
      postgresql_user:
        name: postgres
        password: "{{ postgres_password }}"

    - name: Create a test database
      become: yes
      become_user: postgres
      postgresql_db:
        name: testdb
        state: present
