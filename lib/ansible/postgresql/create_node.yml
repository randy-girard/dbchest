---
# PostgreSQL Installation and Configuration
# This playbook dynamically detects PostgreSQL configuration paths using SHOW commands
# for maximum portability across different installations and versions
- name: Install PostgreSQL
  hosts: all
  become: yes
  vars:
    postgresql_version: 15
    postgres_password: "mysecurepassword"

  handlers:
    - name: Restart PostgreSQL
      service:
        name: postgresql
        state: restarted

  gather_facts: no
  pre_tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 30

  tasks:
    - name: Gather facts manually after SSH is ready
      ansible.builtin.setup:

    - name: Ensure prerequisites are installed
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - wget
          - gnupg
          - python3-psycopg2
        state: present
        update_cache: yes

    - name: Add PostgreSQL public key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

#    - name: Add PostgreSQL APT repository
#      apt_repository:
#        repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
#        state: present
#        filename: pgdg

    - name: Add PostgreSQL APT archive repository
      apt_repository:
        repo: "deb https://apt-archive.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
        state: present
        filename: pgdg

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install PostgreSQL packages
      apt:
        name:
          - "postgresql-{{ postgresql_version }}"
          - "postgresql-contrib-{{ postgresql_version }}"
        state: present

    - name: Ensure remote_tmp exists for postgres user
      file:
        path: /var/lib/postgresql/.ansible/tmp
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Ensure PostgreSQL is running
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Get PostgreSQL configuration file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW config_file;'
      register: pg_config_file
      changed_when: false

    - name: Get PostgreSQL data directory path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW data_directory;'
      register: pg_data_directory
      changed_when: false

    - name: Get PostgreSQL hba_file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW hba_file;'
      register: pg_hba_file
      changed_when: false

    - name: Set PostgreSQL paths
      set_fact:
        postgresql_config_file: "{{ pg_config_file.stdout.strip() }}"
        postgresql_config_dir: "{{ pg_config_file.stdout.strip() | dirname }}"
        postgresql_data_dir: "{{ pg_data_directory.stdout.strip() }}"
        postgresql_hba_file: "{{ pg_hba_file.stdout.strip() }}"

    - name: Configure PostgreSQL for replication (postgresql.conf)
      lineinfile:
        path: "{{ postgresql_config_file }}"
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        state: present
      loop:
        - { key: "listen_addresses", value: "'*'" }
        - { key: "wal_level", value: "replica" }
        - { key: "max_wal_senders", value: "3" }
        - { key: "wal_keep_size", value: "64MB" }
        - { key: "archive_mode", value: "on" }
        - { key: "archive_command", value: "'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'" }
        - { key: "hot_standby", value: "on" }
        - { key: "max_standby_streaming_delay", value: "30s" }
        - { key: "wal_receiver_status_interval", value: "10s" }
        - { key: "hot_standby_feedback", value: "on" }
      notify: Restart PostgreSQL

    - name: Create archive directory
      file:
        path: /var/lib/postgresql/archive
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Allow remote connections in pg_hba.conf
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        line: "host all all 0.0.0.0/0 md5"
        state: present
      notify: Restart PostgreSQL

    - name: Set postgres password
      become: yes
      become_user: postgres
      shell: |
        psql -c "ALTER USER postgres PASSWORD '{{ postgres_password }}';" postgres
