---
# Clean up replica-specific configuration when replica is deleted
# Dynamically detects pg_hba.conf path for portability
- name: Remove Replica-Specific Configuration from Primary
  hosts: postgres_servers
  become: yes
  vars:
    postgresql_version: "15"

  tasks:
    - name: Get PostgreSQL hba_file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW hba_file;'
      register: pg_hba_file
      changed_when: false

    - name: Set PostgreSQL paths
      set_fact:
        postgresql_hba_file: "{{ pg_hba_file.stdout.strip() }}"

    - name: Validate replica_ip is not empty
      fail:
        msg: "replica_ip variable is empty or undefined. Cannot clean up pg_hba.conf"
      when: replica_ip is undefined or replica_ip == ""

    - name: Remove replica-specific pg_hba.conf entry for replication
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        line: "host replication replicator {{ replica_ip }}/32 md5"
        state: absent
        backup: yes
      notify: reload postgresql

    - name: Remove replica-specific pg_hba.conf entry for regular connections
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        line: "host all all {{ replica_ip }}/32 md5"
        state: absent
        backup: yes
      notify: reload postgresql

  handlers:
    - name: reload postgresql
      become_user: postgres
      postgresql_query:
        db: postgres
        query: "SELECT pg_reload_conf()"
