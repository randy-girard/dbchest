---
# Clean up replica-specific configuration when replica is deleted
# Dynamically detects pg_hba.conf path for portability
- name: Remove Replica-Specific Configuration from Primary
  hosts: postgres_servers
  become: yes
  vars:
    postgresql_version: "{{ postgresql_version | default('15') }}"

  tasks:
    - name: Get PostgreSQL hba_file path
      become_user: postgres
      shell: |
        psql -t -P format=unaligned -c 'SHOW hba_file;'
      register: pg_hba_file
      changed_when: false

    - name: Set PostgreSQL paths
      set_fact:
        postgresql_hba_file: "{{ pg_hba_file.stdout.strip() }}"

    - name: Validate replica_ip is not empty
      fail:
        msg: "replica_ip variable is empty or undefined. Cannot clean up pg_hba.conf"
      when: replica_ip is undefined or replica_ip == ""

    - name: Remove replica-specific pg_hba.conf comment
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        regexp: "^# Replication from .* \\({{ replica_ip }}\\)"
        state: absent
        backup: yes

    - name: Remove replica-specific pg_hba.conf entry for replication protocol
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        regexp: "^host\\s+replication\\s+replication\\s+{{ replica_ip }}/32"
        state: absent
        backup: yes

    - name: Remove replica-specific pg_hba.conf entry for postgres database
      lineinfile:
        path: "{{ postgresql_hba_file }}"
        regexp: "^host\\s+postgres\\s+replication\\s+{{ replica_ip }}/32"
        state: absent
        backup: yes

    # Note: We no longer add/remove catch-all pg_hba entries for replicas
    # User-specific entries are managed separately

    - name: Reload PostgreSQL configuration
      become_user: postgres
      shell: |
        psql -c "SELECT pg_reload_conf();" postgres
      changed_when: true

  handlers:
    - name: reload postgresql
      become_user: postgres
      shell: |
        psql -c "SELECT pg_reload_conf();" postgres
