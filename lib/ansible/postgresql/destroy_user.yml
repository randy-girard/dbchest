---
- name: Remove PostgreSQL user and clean pg_hba.conf
  hosts: all
  become: true

  tasks:
    - name: Get PostgreSQL configuration paths
      community.postgresql.postgresql_info:
        filter: settings
      become_user: postgres
      register: pg_info

    - name: Set fact for pg_hba.conf path
      set_fact:
        pg_hba_conf: "{{ pg_info.settings.hba_file.setting }}"

    - name: Remove pg_hba.conf entry for user
      lineinfile:
        path: "{{ pg_hba_conf }}"
        regexp: "^host\\s+all\\s+{{ username }}\\s+0.0.0.0/0\\s+scram-sha-256"
        state: absent
      notify: Reload PostgreSQL

    - name: Ensure PostgreSQL role is absent
      become_user: postgres
      shell: |
        psql -c "DROP USER IF EXISTS {{ username }};" postgres

  handlers:
    - name: Reload PostgreSQL
      become_user: postgres
      shell: |
        psql -c "SELECT pg_reload_conf();" postgres
      register: reload_result
      changed_when: true
      failed_when: reload_result.rc != 0
